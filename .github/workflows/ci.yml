name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgit2-dev

      - name: Check
        run: cargo check

      - name: Fmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings -A dead_code -A unused_imports -A clippy::collapsible_match -A clippy::derivable_impls -A clippy::useless_format -A clippy::extend_with_drain -A clippy::no_effect_replace -A clippy::if_same_then_else
