name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libgit2-dev

      - name: Check
        run: cargo check

      - name: Fmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings
